# Cognitive Ledger configuration - copy this file to config.yaml and edit values as needed
# Values here are overridden by environment variables (LEDGER_ROOT, etc.)

# Set to true on first install. The session_start hook will inject setup instructions
# for the agent and prompt it to build your platform's memory index (e.g. MEMORY.md).
# The agent will set this to false once setup is complete.
first_run: true

# Paths (use ~ for home directory)
# ledger_root: ~/code/cognitive-ledger
# ledger_notes_dir: ~/code/cognitive-ledger/notes
# source_notes_dir: ~/notes

# A/B eval corpus (used with: scripts/ledger_ab --corpus <path>)
# eval_corpus: ~/code/my-ledger-instance

# Retrieval tuning
# retrieval_mode: legacy
# embed_backend: local
# embed_model: TaylorAI/bge-micro-v2

# Scoring weights (must sum to ~1.0)
# score_weight_bm25: 0.30
# score_weight_lexical: 0.15
# score_weight_tag: 0.15
# score_weight_scope: 0.15
# score_weight_recency: 0.15
# score_weight_confidence: 0.10

# Shortlisting
# shortlist_min_candidates: 24
# shortlist_max_candidates: 36
