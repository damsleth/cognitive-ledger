# Retrieval eval cases for A/B testing
#
# Add cases that reference notes in your ledger (or external corpus).
# Each case needs a query, an id, and expected_any paths:
#
# - query: "What is the team's deployment process?"
#   id: fact_deployment_process
#   scope: "work"
#   expected_any:
#     - "notes/02_facts/fact__deployment_process.md"
#
# Run eval:   ./scripts/ledger eval --cases /absolute/path/to/retrieval_eval_cases.yaml --k 3
# Run A/B:    ./scripts/ledger_ab --baseline-ref main --candidate-ref HEAD
# External:   ./scripts/ledger_ab --corpus ~/Code/ledger-notes --baseline-ref main --candidate-ref HEAD
